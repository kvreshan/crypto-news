<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Signals | CryptoSignals LK</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="ad-header"></div>

<nav class="navbar">
  <div class="container nav-inner">
    <a href="/" class="logo">
      <span class="logo-icon">₿</span>
      <span class="logo-text">CryptoSignals<span class="logo-lk">LK</span></span>
    </a>
    <div class="nav-links">
      <a href="/">News</a>
      <a href="/signals.html" class="active">Signals</a>
      <a href="#" id="telegram-link" target="_blank">Telegram</a>
    </div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
  <div class="mobile-menu" id="mobile-menu">
    <a href="/">News</a>
    <a href="/signals.html">Signals</a>
  </div>
</nav>

<main class="container">
  <div style="padding: 24px 0 8px;">
    <h1 style="font-size:24px;font-weight:800;margin-bottom:8px;">Live Trading Signals</h1>
    <p style="color:var(--text-secondary);font-size:14px;">AI-powered crypto signals. Not financial advice — always DYOR.</p>
  </div>

  <div id="ad-article-top"></div>

  <div class="filter-pills" style="margin-bottom:8px;">
    <button class="pill active" data-filter="all">All</button>
    <button class="pill" data-filter="BUY">Buy</button>
    <button class="pill" data-filter="SELL">Sell</button>
    <button class="pill" data-filter="HOLD">Hold</button>
  </div>

  <div class="signals-grid" id="signals-grid">
    <div class="signal-card skeleton-box"></div>
    <div class="signal-card skeleton-box"></div>
    <div class="signal-card skeleton-box"></div>
  </div>

  <div id="ad-sidebar" style="margin:24px 0;"></div>
</main>

<footer class="footer">
  <div class="container footer-inner">
    <div class="footer-brand"><span class="logo-icon">₿</span><span>CryptoSignals LK</span></div>
    <p class="footer-disclaimer">Not financial advice. Cryptocurrency investments involve significant risk.</p>
  </div>
</footer>

<div id="ad-popup"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/supabase.js"></script>
<script src="/js/ads.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  ADS.init();
  await loadSignals();

  document.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      loadSignals(pill.dataset.filter);
    });
  });

  document.getElementById('hamburger').addEventListener('click', () => {
    document.getElementById('mobile-menu').classList.toggle('open');
  });
});

async function loadSignals(filter = 'all') {
  const signals = await DB.getSignals(50);
  const filtered = filter === 'all' ? signals : signals.filter(s => s.signal_type === filter);
  const grid = document.getElementById('signals-grid');

  if (!filtered.length) {
    grid.innerHTML = '<p style="padding:40px;text-align:center;color:var(--text-muted);grid-column:1/-1;">No signals found</p>';
    return;
  }

  grid.innerHTML = filtered.map(s => {
    const badgeClass = s.signal_type === 'BUY' ? 'badge-buy' : s.signal_type === 'SELL' ? 'badge-sell' : 'badge-hold';
    const time = new Date(s.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    return `
      <div class="signal-card">
        <div class="signal-card-header">
          <span class="signal-card-coin">${s.coin}/USDT</span>
          <div>
            <span class="signal-badge ${badgeClass}">${s.signal_type}</span>
            <div class="signal-card-time">${time}</div>
          </div>
        </div>
        <div class="signal-prices">
          <div class="signal-price-item">
            <div class="signal-price-label">Entry</div>
            <div class="signal-price-value entry-price">$${s.entry_price || 'TBA'}</div>
          </div>
          <div class="signal-price-item">
            <div class="signal-price-label">Target</div>
            <div class="signal-price-value target-price">$${s.target_price || 'TBA'}</div>
          </div>
          <div class="signal-price-item">
            <div class="signal-price-label">Stop Loss</div>
            <div class="signal-price-value stop-price">$${s.stop_loss || 'TBA'}</div>
          </div>
        </div>
        ${s.content ? `<p style="font-size:12px;color:var(--text-secondary);margin-top:8px;line-height:1.5;">${s.content}</p>` : ''}
        ${s.confidence ? `
          <div class="signal-confidence">
            <div class="confidence-label"><span>Confidence</span><span>${s.confidence}%</span></div>
            <div class="confidence-bar"><div class="confidence-fill" style="width:${s.confidence}%"></div></div>
          </div>` : ''}
      </div>`;
  }).join('');
}
</script>
</body>
</html>
