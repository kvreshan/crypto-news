<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | CryptoSignals LK</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      margin: 20px;
    }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .logo-icon { font-size: 40px; display: block; }
    .login-logo h1 { font-size: 20px; margin-top: 8px; }
    .login-logo p { color: var(--text-muted); font-size: 13px; margin-top: 4px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-secondary); }
    .form-input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 14px;
      font-family: var(--font);
      transition: border-color 0.2s;
      outline: none;
    }
    .form-input:focus { border-color: var(--accent); }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #000;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      border: none;
    }
    .submit-btn:hover { background: var(--accent-hover); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
    .alert-success { background: #00c89622; color: var(--accent-green); border: 1px solid #00c89644; }
    .alert-error { background: #ff475722; color: var(--accent-red); border: 1px solid #ff475744; }
    .alert.show { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <span class="logo-icon">₿</span>
      <h1>Admin Panel</h1>
      <p>CryptoSignals LK</p>
    </div>

    <div class="alert alert-success" id="alert-success">
      ✅ Magic link sent! Check your email inbox.
    </div>
    <div class="alert alert-error" id="alert-error"></div>

    <div id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Admin Email</label>
        <input type="email" id="email" class="form-input" placeholder="admin@yourdomain.com" required>
      </div>
      <button class="submit-btn" id="send-btn" onclick="sendMagicLink()">
        Send Magic Link
      </button>
    </div>

    <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:20px;">
      No password needed — we'll email you a secure login link
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script>
    const { createClient } = supabase;
    const db = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

    // Check if already logged in
    db.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = '/admin/dashboard.html';
    });

    // Handle magic link callback
    db.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) {
        window.location.href = '/admin/dashboard.html';
      }
    });

    async function sendMagicLink() {
      const email = document.getElementById('email').value.trim();
      if (!email) return;

      const btn = document.getElementById('send-btn');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      hideAlerts();

      const { error } = await db.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo: `${window.location.origin}/admin/dashboard.html`,
        }
      });

      if (error) {
        showError(error.message);
        btn.disabled = false;
        btn.textContent = 'Send Magic Link';
      } else {
        document.getElementById('alert-success').classList.add('show');
        btn.textContent = 'Link Sent ✓';
      }
    }

    document.getElementById('email').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMagicLink();
    });

    function showError(msg) {
      const el = document.getElementById('alert-error');
      el.textContent = '❌ ' + msg;
      el.classList.add('show');
    }

    function hideAlerts() {
      document.getElementById('alert-success').classList.remove('show');
      document.getElementById('alert-error').classList.remove('show');
    }
  </script>
</body>
</html>
